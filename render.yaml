# Render.com configuratie voor de TaPas Platform demo.
# Eén Node-webservice; geen aparte Python-sidecar nodig (de AI-chat draait
# in demo-modus op de ingebouwde kennisbank-engine).
services:
  - type: web
    name: tapas-demo
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --include=dev && node build.cjs
    startCommand: node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: TAPAS_DEMO
        value: "1"
      - key: NODE_VERSION
        value: "20.18.0"
